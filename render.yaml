# Render service manifest for the gym2 backend
# After connecting this repo in Render, set the HF_API_KEY secret in the Render dashboard.

services:
  - type: web
    name: gym2-backend
    env: node
    plan: free
    branch: master
    buildCommand: npm run build
    startCommand: npm run start
    instanceType: starter
    autoDeploy: true
